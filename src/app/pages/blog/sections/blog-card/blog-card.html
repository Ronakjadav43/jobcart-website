
<div>
<div class="!hidden group relative cursor-pointer">
    <!-- Image -->
    <div class="overflow-hidden">
        <img [src]="image" class="w-full h-[280px] object-cover transition duration-500 group-hover:scale-110" />
    </div>
    <!-- Content Card -->
    <div
    class="flex flex-col bg-white relative z-[1] -mt-[59px] left-[23px] w-[calc(100%-23px)] pt-[30px] pr-[25px] pb-[25px] pl-[30px] shadow-xl gap-4">
        <h3
            class="font-['Hanken_Grotesk'] font-semibold text-[24px] leading-[28.8px] tracking-[-0.24px] text-[#0F172A] group-hover:text-teal-600 transition">
           <a [routerLink]="['/blog', slug]" class="line-clamp-2">
             {{title}}
            </a>
        </h3>
        <p class="font-['Hanken_Grotesk'] font-medium text-[18px] leading-[27px] tracking-[-0.18px] text-[#0F172A] line-clamp-3">
            {{description}}
        </p>
        <div class="mt-4 text-teal-600 text-sm font-medium">
            {{date}}
        </div>
    </div>
</div>



 <div class="bg-white rounded-xl shadow-lg max-w-sm w-full overflow-hidden">
        <!-- {/* Card Image */} -->
        <div class="flex relative w-full h-[250px] aspect-[4/3]">
          <img
            [src]="image"
            alt="Trending article image"
            fill
            class="object-cover object-top"
            priority
          />
        </div>

        <!-- {/* Card Content */} -->
        <div class="p-6">
          <!-- {/* Date Badge and Title Row */} -->
          <div class="flex items-center gap-4 mb-6">
            <!-- {/* Date Badge */} -->
            <div class="flex-shrink-0 w-16 h-16 rounded-full bg-white border-2 border-gray-100 shadow-md flex flex-col items-center justify-center">
              <span class="text-2xl font-bold text-gray-800 leading-none"> {{ date | date:'dd' }}</span>
              <span class="text-xs font-semibold text-teal-500 uppercase tracking-wide"> {{ date | date:'MMM' }}</span>
            </div>

            <!-- {/* Title */} -->
              <h3
            class="font-['Hanken_Grotesk'] font-semibold text-[24px] leading-[28.8px] tracking-[-0.24px] text-[#0F172A] group-hover:text-teal-600 transition">
           <a [routerLink]="['/blog', slug]" class="line-clamp-2">
             {{title}}
            </a>
        </h3>
          </div>

          <!-- {/* Description */} -->
          <p class="font-['Hanken_Grotesk'] font-medium text-[16px] leading-[27px] tracking-[-0.18px] text-[#0F172A] line-clamp-3 mb-6">
            {{description}}
        </p>

          <!-- {/* Read More Button */} -->
         

          <a [routerLink]="['/blog', slug]" class="flex items-center justify-center w-auto h-12  bg-[#06707D] text-white rounded-lg font-['Hanken_Grotesk'] font-bold text-base text-center gap-4 hover:text-[#06707D] hover:bg-white hover:border-[#06707D] hover:border">
            Read more
            <span class="text-xl ml-3">⟶</span>
          </a>




        </div>
      </div>

      </div>
