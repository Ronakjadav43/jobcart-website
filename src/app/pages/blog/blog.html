<section class=" from-slate-50 to-white py-6 sm:py-8 lg:py-12 px-2 sm:px-6 lg:px-8">
  <div class="max-w-7xl mx-auto px-2 sm:px-6 lg:px-8">

    <!-- Header -->
    <div class="mb-12 flex flex-col gap-[20px]">
      <h2 class="font-['Hanken_Grotesk'] font-semibold h2-45 tracking-[-0.9px] text-[#0F172A]">
        From the 
         <span
          class="font-serif font-normal italic h2-45 tracking-[-0.9px] text-[#06707D]">
        Blog
        </span>
      </h2>
      <!-- <p class="font-['Hanken_Grotesk'] font-medium text-lg lg:text-xl text-[#0F172A]">
        Fill any gaps with temporary staff while you find quality candidates for permanent roles.
      </p> -->
    </div>

    <!-- Cards Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">

    

 <app-blog-card
        *ngFor="let blog of blogs"
        [title]="blog.title"
        [description]="blog.description"
        [image]="blog.image"
        [date]="blog.date"
        [slug]="blog.slug">
      </app-blog-card>






    </div>
  </div>
</section>
