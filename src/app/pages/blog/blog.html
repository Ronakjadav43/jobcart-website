<section class="from-slate-50 to-white py-6 sm:py-8 lg:py-12 px-2 sm:px-6 lg:px-8">
  <div class="max-w-7xl mx-auto px-2 sm:px-6 lg:px-8">
    <!-- Header -->
    <div class="mb-12 flex flex-col gap-[20px]">
      <h2 class="font-['Hanken_Grotesk'] font-semibold h2-45 tracking-[-0.9px] text-[#0F172A]">
        From the
        <span class="font-serif font-normal italic h2-45 tracking-[-0.9px] text-[#06707D]">
          Blog
        </span>
      </h2>
    </div>

    <!-- Cards Grid -->
    <div
      *ngIf="!loading && pagedBlogs.length > 0"
      class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"
    >
      <app-blog-card
        *ngFor="let blog of pagedBlogs"
        [title]="blog.blogTitle"
        [description]="blog.blogSummary"
        [image]="blog.blogImgFullPath"
        [date]="blog.createdDt"
        [slug]="blog.blogUrl"
      >
      </app-blog-card>
    </div>

    <!-- Skeleton Loading Grid -->
    <div *ngIf="loading" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      <div
        *ngFor="let i of [1, 2, 3, 4, 5, 6]"
        class="bg-white rounded-[24px] overflow-hidden shadow-sm flex flex-col h-full animate-pulse p-6"
      >
        <!-- Image placeholder -->
        <div class="h-64 bg-gray-200 rounded-xl mb-6 w-full"></div>
        <!-- Date placeholder -->
        <div class="h-4 bg-gray-200 rounded w-1/3 mb-4"></div>
        <!-- Title placeholder -->
        <div class="h-6 bg-gray-200 rounded w-3/4 mb-3"></div>
        <div class="h-6 bg-gray-200 rounded w-1/2 mb-4"></div>
        <!-- Description placeholder -->
        <div class="h-4 bg-gray-200 rounded w-full mb-2 mt-auto"></div>
        <div class="h-4 bg-gray-200 rounded w-5/6"></div>
      </div>
    </div>

    <div *ngIf="!loading && blogs.length > 0" class="mt-10 flex justify-center">
      <mat-paginator
        [length]="blogs.length"
        [pageSize]="pageSize"
        [pageSizeOptions]="[6, 9, 12]"
        (page)="onPageChange($event)"
      >
      </mat-paginator>
    </div>
  </div>
</section>
