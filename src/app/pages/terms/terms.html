<section class="from-slate-50 to-white py-6 sm:py-8 lg:py-12 px-2 sm:px-6 lg:px-8">
  <div class="max-w-6xl mx-auto px-2 sm:px-6 lg:px-8">
    <!-- Header -->
    <div class="mb-8 border-b pb-6">
      <h1 class="font-['Hanken_Grotesk'] font-bold text-3xl md:text-5xl text-[#0F172A] mb-4">
        {{ termData.Title }}
      </h1>

      <!-- Footer Date -->
      <div class="flex justify-start mt-8">
        <div class="font-medium font-['Hanken_Grotesk'] text-base text-gray-500">
          {{ formattedDate }}
        </div>
      </div>
    </div>

    <!-- Content -->
    <div
      class="prose prose-lg max-w-none text-gray-700 font-['Hanken_Grotesk']"
      [innerHTML]="termData.Descp"
    ></div>
  </div>
</section>
